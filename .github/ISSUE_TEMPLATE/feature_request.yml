name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Tell us about it!

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Is there a workaround today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - API provider support
        - UI improvement
        - Commit style/format
        - Performance
        - Other
    validations:
      required: true
